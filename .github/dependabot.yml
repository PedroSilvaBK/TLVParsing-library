version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/lib"          # location of build.gradle / settings.gradle
    schedule:
      interval: "weekly"    # daily | weekly | monthly
    open-pull-requests-limit: 10
    groups:
      # Bundle low-risk updates into one PR instead of many
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
